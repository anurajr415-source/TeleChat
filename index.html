<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleChat - Anuraj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; }
        .wa-green { background-color: #00a884; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-section" class="flex flex-col items-center justify-center h-screen p-6">
        <h1 class="text-2xl font-bold mb-6 text-white text-center">Verify your phone number</h1>
        <div class="flex gap-2 w-full max-w-sm mb-4 border-b border-[#00a884] p-2">
            <span class="text-white">+91</span>
            <input id="phone-number" type="tel" placeholder="Phone number" class="bg-transparent flex-1 outline-none text-white">
        </div>
        <div id="recaptcha-container"></div>
        <button onclick="sendOTP()" class="wa-green text-[#0b141a] font-bold px-10 py-3 rounded-full mt-10 shadow-lg">NEXT</button>
    </div>

    <div id="otp-section" class="flex flex-col items-center justify-center h-screen p-6 hidden">
        <h1 class="text-xl font-bold mb-4">Enter 6-digit code</h1>
        <input id="otp-input" type="number" class="bg-transparent border-b border-[#00a884] text-3xl tracking-widest text-center w-48 outline-none mb-10">
        <button onclick="verifyOTP()" class="wa-green text-[#0b141a] font-bold px-10 py-3 rounded-full shadow-lg">VERIFY</button>
    </div>

    <div id="main-app" class="flex flex-col h-screen hidden">
        <div class="bg-[#111b21] p-4 flex justify-between items-center shadow-md">
            <h1 class="text-2xl font-semibold text-[#8696a0]">TeleChat</h1>
            <div class="flex gap-5 text-xl text-[#8696a0]"><i class="fas fa-camera"></i><i class="fas fa-search"></i><i class="fas fa-ellipsis-v"></i></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4">
            <div class="flex items-center gap-4 border-b border-[#222d34] pb-4">
                <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl">A</div>
                <div>
                    <h2 class="font-bold text-lg">Anuraj Raja</h2>
                    <p class="text-gray-400 text-sm">Welcome! App is live with OTP. ✅</p>
                </div>
            </div>
        </div>
        <div class="bg-[#111b21] flex justify-around p-4 border-t border-[#222d34]">
            <div class="text-[#00a884] flex flex-col items-center"><i class="fas fa-comment text-xl"></i><span class="text-xs mt-1">Chats</span></div>
            <div class="text-[#8696a0] flex flex-col items-center"><i class="fas fa-circle-notch text-xl"></i><span class="text-xs mt-1">Updates</span></div>
            <div class="text-[#8696a0] flex flex-col items-center"><i class="fas fa-phone text-xl"></i><span class="text-xs mt-1">Calls</span></div>
        </div>
    </div>

    <script>
        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA0Aqj789tKX9uSR8TC...", // I will use your full key from SS
            authDomain: "telechatanuraj-32aa3.firebaseapp.com",
            projectId: "telechatanuraj-32aa3",
            storageBucket: "telechatanuraj-32aa3.appspot.com",
            messagingSenderId: "179058252618",
            appId: "1:179058252618:web:783478546b29f448c58f0e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        function sendOTP() {
            const phoneNumber = "+91" + document.getElementById('phone-number').value;
            const appVerifier = window.recaptchaVerifier;
            auth.signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                }).catch((error) => alert("Error: " + error.message));
        }

        function verifyOTP() {
            const code = document.getElementById('otp-input').value;
            confirmationResult.confirm(code).then(() => {
                document.getElementById('otp-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }).catch(() => alert("Invalid OTP!"));
        }
    </script>
</body>
</html>
