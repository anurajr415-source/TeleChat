<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleChat - Real Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.06; position: absolute; inset: 0; z-index: -1; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div class="bg-[#111b21] p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <i class="fas fa-arrow-left"></i>
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">A</div>
            <div>
                <h2 class="font-bold">TeleChat Global</h2>
                <p class="text-[10px] text-[#00a884]">Online</p>
            </div>
        </div>
        <div class="flex gap-5 text-xl text-[#8696a0]">
            <i class="fas fa-video"></i><i class="fas fa-phone-alt"></i><i class="fas fa-ellipsis-v"></i>
        </div>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 relative flex flex-col space-y-3">
        <div class="chat-bg"></div>
        </div>

    <div class="p-3 bg-[#111b21] flex items-center gap-2">
        <div class="flex-1 bg-[#2a3942] rounded-full flex items-center px-4 py-2">
            <i class="far fa-smile text-[#8696a0] mr-3"></i>
            <input id="msg-input" type="text" placeholder="Message" class="bg-transparent flex-1 outline-none text-white">
            <i class="fas fa-paperclip text-[#8696a0] ml-3"></i>
        </div>
        <button onclick="sendMessage()" class="bg-[#00a884] w-12 h-12 rounded-full flex items-center justify-center text-[#0b141a] text-xl">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0Aqj789tKX9uSR8TC_a3tUl3O-SVIKAE",
            authDomain: "telechatanuraj-32aa3.firebaseapp.com",
            databaseURL: "https://telechatanuraj-32aa3-default-rtdb.firebaseio.com/",
            projectId: "telechatanuraj-32aa3",
            storageBucket: "telechatanuraj-32aa3.firebasestorage.app",
            messagingSenderId: "179058252618",
            appId: "1:179058252618:web:b59eb793307221e0877fb3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // मैसेज भेजना
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim() !== "") {
                db.ref("messages").push().set({
                    text: input.value,
                    sender: "Anuraj", // इसे आप डायनामिक कर सकते हैं
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                input.value = "";
            }
        }

        // मैसेज लोड करना (Real-time)
        db.ref("messages").on("child_added", (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            
            // खुद का मैसेज दाईं तरफ, दूसरों का बाईं तरफ
            const isMe = data.sender === "Anuraj";
            msgDiv.className = isMe ? "self-end bg-[#005c4b] p-2 rounded-lg max-w-[80%] shadow-sm" : "self-start bg-[#202c33] p-2 rounded-lg max-w-[80%] shadow-sm";
            
            msgDiv.innerHTML = `<p class="text-sm">${data.text}</p><p class="text-[9px] text-right text-gray-400 mt-1">${data.time}</p>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
