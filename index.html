<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .wa-green { background-color: #075E54; }
        .wa-light-green { background-color: #25D366; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    </style>
</head>
<body class="flex flex-col h-screen bg-gray-100">
    <div class="wa-green text-white p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-green-800 font-bold">TC</div>
            <h1 class="text-xl font-bold">TeleChat</h1>
        </div>
        <div class="flex gap-4 text-xl">
            <span>📷</span><span>🔍</span><span>⋮</span>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 chat-bg space-y-4">
        <div class="bg-white p-2 rounded-lg max-w-[80%] shadow-sm self-start">
            Hello! Welcome to TeleChat. 🚀
            <div class="text-[10px] text-gray-400 text-right">18:30</div>
        </div>
        <div class="bg-green-100 p-2 rounded-lg max-w-[80%] shadow-sm self-end ml-auto">
            Bhai, ye toh bilkul WhatsApp lag raha hai!
            <div class="text-[10px] text-gray-400 text-right">18:31</div>
        </div>
    </div>

    <div class="p-3 bg-gray-200 flex items-center gap-2">
        <div class="flex-1 bg-white rounded-full px-4 py-2 flex items-center shadow-sm">
            <span class="mr-2">😊</span>
            <input type="text" placeholder="Message" class="flex-1 outline-none">
            <span class="ml-2 text-gray-400">📎</span>
        </div>
        <div class="wa-light-green w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg">
            🎤
        </div>
    </div>
</body>
</html>
