<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleChat - Anuraj Raja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; transition: all 0.5s; }
        .wa-dark { background-color: #111b21; }
        .active-tab { color: #00a884; }
        .text-gray { color: #8696a0; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div id="login-page" class="flex flex-col items-center justify-center h-full p-8 text-center">
        <div class="w-24 h-24 bg-[#00a884] rounded-full flex items-center justify-center text-5xl mb-6 shadow-lg">💬</div>
        <h1 class="text-3xl font-bold mb-2">Welcome to TeleChat</h1>
        <p class="text-gray mb-8 text-sm">Created by Anuraj Raja</p>
        
        <input id="user-name" type="text" placeholder="Enter Your Name" class="w-full bg-[#111b21] border border-[#222d34] p-4 rounded-xl mb-4 outline-none focus:border-[#00a884]">
        <button onclick="startApp()" class="w-full bg-[#00a884] text-[#0b141a] font-bold p-4 rounded-xl shadow-lg hover:bg-[#008f72] transition">Get Started</button>
    </div>

    <div id="main-app" class="flex flex-col h-full hidden">
        <div class="wa-dark p-4 flex justify-between items-center shadow-md">
            <h1 class="text-2xl font-semibold">TeleChat</h1>
            <div class="flex gap-5 text-xl">
                <i class="fas fa-qrcode"></i>
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto">
            <div class="p-4 flex items-center gap-4 hover:bg-[#202c33] cursor-pointer">
                <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
                <div class="flex-1 border-b border-[#222d34] pb-3">
                    <div class="flex justify-between">
                        <h2 class="font-medium" id="display-name">User Name</h2>
                        <span class="text-xs text-gray">Just now</span>
                    </div>
                    <p class="text-gray text-sm">App is ready for chatting! 🚀</p>
                </div>
            </div>
        </div>

        <div class="wa-dark border-t border-[#222d34] flex justify-around p-3 text-center">
            <div class="active-tab flex flex-col items-center"><i class="fas fa-comment-dots text-xl"></i><span class="text-[10px] mt-1">Chats</span></div>
            <div class="text-gray flex flex-col items-center"><i class="fas fa-circle-notch text-xl"></i><span class="text-[10px] mt-1">Updates</span></div>
            <div class="text-gray flex flex-col items-center"><i class="fas fa-users text-xl"></i><span class="text-[10px] mt-1">Communities</span></div>
            <div class="text-gray flex flex-col items-center"><i class="fas fa-phone-alt text-xl"></i><span class="text-[10px] mt-1">Calls</span></div>
        </div>
    </div>

    <script>
        function startApp() {
            const name = document.getElementById('user-name').value;
            if (name.trim() !== "") {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-name').innerText = name;
            } else {
                alert("Please enter a name first!");
            }
        }
    </script>

</body>
</html>
